<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robot Battle 8-bit</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: monospace;
  }

  canvas {
    background: #222;
    border: 4px solid white;
    margin-top: 20px;
  }

  button {
    margin: 10px;
    padding: 10px 20px;
    font-size: 18px;
  }
</style>
</head>

<body>

<h1>🤖 Robot Battle 8-bit</h1>

<canvas id="game" width="400" height="200"></canvas>

<br>
<button onclick="attack()">ATTACK</button>
<button onclick="hit()">HIT</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// โหลดรูปเดียว (สำคัญ!)
const sprite = new Image();
sprite.src = "Sprite.png";

// สถานะ
let mode = "idle";
let x = 150;

// วาดตัวละคร
function draw() {
  ctx.clearRect(0, 0, 400, 200);

  // animation ง่ายๆ (ขยับตำแหน่ง)
  if (mode === "attack") {
    x += 2;
  } else if (mode === "hit") {
    x -= 2;
  }

  ctx.drawImage(sprite, x, 80, 100, 100);

  requestAnimationFrame(draw);
}

// ปุ่ม
function attack() {
  mode = "attack";
  setTimeout(() => mode = "idle", 300);
}

function hit() {
  mode = "hit";
  setTimeout(() => mode = "idle", 300);
}

// รอโหลดรูปก่อนเริ่ม
sprite.onload = () => {
  draw();
};
</script>

</body>
</html>
